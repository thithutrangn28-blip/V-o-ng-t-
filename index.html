<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snack chấm sữa 🥛</title>
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/dVvXk7cx/f61816f17dbdc4a236fc5d60a79c25d6.jpg" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#F3B4C2" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/dVvXk7cx/f61816f17dbdc4a236fc5d60a79c25d6.jpg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Snack chấm sữa 🥛" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, (err) => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
